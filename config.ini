# =======================================================
# Mkcert 增强版证书工具 - 配置文件
# =======================================================

[paths]
# 文件路径
# mkcert.exe 所在目录（留空则按项目根目录，系统 PATH 进行查找）
mkcert_path = bin/mkcert.exe
# 证书输出目录
cert_output_dir = certs

[ca]
# 根证书 CA 默认参数
# 颁发机构的组织名称
ca-org = Local CA
# 颁发机构的部门名称
ca-orgUnit = Development
# 通用名称（显示在浏览器证书信息中）
ca-commonName = mkcert root CA
# CA 有效年数（建议10年）
ca-years = 10

[cert]
# 域名证书默认参数
# 组织名称
cert-org = Local Cert
# 部门名称
cert-orgUnit = Web Server
# 证书有效天数，浏览器最多信任825天，建议不超过此值
cert-days = 825

[alerts]
# 到期预警阈值（天）
# 剩余天数 <= warn_days_yellow 时，证书列表以黄色标注
warn_days_yellow = 30
# 剩余天数 <= warn_days_red 时，以红色高亮警告
warn_days_red = 7

[renewal]
# 快速续期时默认值，浏览器最多信任 825 天，建议不超过此值
renew_days = 825

[ui]
# 界面语言（预留字段，当前仅支持 zh-CN）
language = zh-CN
