# =======================================================
# Mkcert 增强版证书工具 - 配置文件
# =======================================================

[paths]
# 增强版mkcert.exe所在目录（留空则按项目根目录，系统 PATH 进行查找）
mkcert_path = bin/mkcert.exe
# 日志输出目录
log_file = logs/mkcert.log
# 证书输出目录
cert_output_dir = certs

[ca]
# CA根证书颁发机构的组织名称
ca-org = Local CA
# CA根证书颁发机构的部门名称
ca-orgUnit = Development
# CA根证书通用名称（显示在浏览器证书信息中）
ca-commonName = mkcert root CA
# CA根证书有效年数
ca-years = 10

[cert]
# 域名证书组织名称
cert-org = Local Cert
# 域名证书部门名称
cert-orgUnit = Web Server
# 域名证书有效天数 (本地自签证书通常不受公网证书最长有效期规则的限制)
cert-days = 3650
# 申请域名默认值
default_domains = localhost

[renewal]
# 快速续期时默认天数 (本地自签证书可按需设置较长有效期)
renew_days = 3650

[alerts]
# 到期预警阈值（天）
# 剩余天数 <= warn_days_yellow 时，证书列表以黄色标注
warn_days_yellow = 30
# 剩余天数 <= warn_days_red 时，以红色高亮警告
warn_days_red = 7

[ui]
# 界面语言（预留字段，当前仅支持 zh-CN）
language = zh-CN
